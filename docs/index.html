  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonicFX — Web Audio API Playground</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      /* Premium custom dark styling applied carefully on top of Bulma structures */
      body {
        background-color: #0f172a;
        color: #f8fafc;
        min-height: 100vh;
      }
      .title {
        background: linear-gradient(to right, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .subtitle {
        color: #94a3b8 !important;
      }
      .box.fx-card {
        background-color: #1e293b;
        border: 1px solid #334155;
        color: #f8fafc;
        cursor: pointer;
        transition: transform 0.1s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .box.fx-card:hover {
        border-color: #3b82f6;
        transform: translateY(-3px);
        box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
      }
      .box.fx-card:active {
        transform: translateY(1px);
      }
      .tag.is-dark-custom {
        background-color: #0f172a;
        color: #38bdf8;
      }
      .logs-panel {
        background-color: #020617;
        border: 1px solid #1e293b;
        border-radius: 6px;
        font-family: monospace;
        font-size: 0.85rem;
        height: 160px;
        overflow-y: auto;
        color: #38bdf8;
        padding: 1rem;
      }
      .section-label {
        color: #94a3b8;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 1.25rem;
      }
    </style>
  </head>
  <body>

    <section class="section">
      <div class="container">
        
        <header class="columns is-mobile is-vcentered is-multiline mb-6">
          <div class="column is-12-mobile is-auto-tablet">
            <h1 class="title is-2 mb-2">SonicFX</h1>
            <p class="subtitle is-6">Real-time Web Audio synthesis sandbox</p>
          </div>
          <div class="column is-12-mobile is-narrow-tablet text-right-tablet">
            <button id="muteBtn" class="button is-info is-rounded is-fullwidth-mobile font-weight-bold">
              <span class="icon">
                <i id="muteIcon" class="fas fa-volume-up"></i>
              </span>
              <span id="muteText">Mute Audio</span>
            </button>
          </div>
        </header>

        <div class="section-label is-size-7">UI & Notifications</div>
        <div class="columns is-multiline is-mobile mb-5">
          
          <div class="column is-6-mobile is-4-tablet is-3-desktop" onclick="trigger('success')">
            <div class="box fx-card has-text-centered">
              <h3 class="heading is-size-6 mb-2">Success</h3>
              <span class="tag is-dark-custom">Sine</span>
            </div>
          </div>

          <div class="column is-6-mobile is-4-tablet is-3-desktop" onclick="trigger('error')">
            <div class="box fx-card has-text-centered">
              <h3 class="heading is-size-6 mb-2">Error</h3>
              <span class="tag is-dark-custom">Triangle</span>
            </div>
          </div>

          <div class="column is-6-mobile is-4-tablet is-3-desktop" onclick="trigger('warning')">
            <div class="box fx-card has-text-centered">
              <h3 class="heading is-size-6 mb-2">Warning</h3>
              <span class="tag is-dark-custom">Triangle</span>
            </div>
          </div>

          <div class="column is-6-mobile is-4-tablet is-3-desktop" onclick="trigger('info')">
            <div class="box fx-card has-text-centered">
              <h3 class="heading is-size-6 mb-2">Info</h3>
              <span class="tag is-dark-custom">Sine</span>
            </div>
          </div>

          <div class="column is-6-mobile is-4-tablet is-3-desktop" onclick="trigger('click')">
            <div class="box fx-card has-text-centered">
              <h3 class="heading is-size-6 mb-2">Click</h3>
              <span class="tag is-dark-custom">Sine</span>
            </div>
          </div>

        </div>

        <div class="section-label is-size-7">Gaming FXs</div>
        <div class="columns is-multiline is-mobile mb-6">

          <div class="column is-6-mobile is-4-tablet is-3-desktop" onclick="trigger('celebration')">
            <div class="box fx-card has-text-centered">
              <h3 class="heading is-size-6 mb-2">Celebration</h3>
              <span class="tag is-dark-custom">Fanfare</span>
            </div>
          </div>

          <div class="column is-6-mobile is-4-tablet is-3-desktop" onclick="trigger('levelUp')">
            <div class="box fx-card has-text-centered">
              <h3 class="heading is-size-6 mb-2">Level Up</h3>
              <span class="tag is-dark-custom">Sweep</span>
            </div>
          </div>

          <div class="column is-6-mobile is-4-tablet is-3-desktop" onclick="trigger('laser')">
            <div class="box fx-card has-text-centered">
              <h3 class="heading is-size-6 mb-2">Laser</h3>
              <span class="tag is-dark-custom">Decay</span>
            </div>
          </div>

          <div class="column is-6-mobile is-4-tablet is-3-desktop" onclick="trigger('powerUp')">
            <div class="box fx-card has-text-centered">
              <h3 class="heading is-size-6 mb-2">Power Up</h3>
              <span class="tag is-dark-custom">Arpeggio</span>
            </div>
          </div>

          <div class="column is-6-mobile is-4-tablet is-3-desktop" onclick="trigger('unlock')">
            <div class="box fx-card has-text-centered">
              <h3 class="heading is-size-6 mb-2">Unlock</h3>
              <span class="tag is-dark-custom">Multi-Tone</span>
            </div>
          </div>

        </div>

        <div class="section-label is-size-7">Console Output Logs</div>
        <div class="logs-panel" id="logs"></div>

      </div>
    </section>
    <script src="https://cdn.jsdelivr.net/gh/sumitkarn12/SonicFX@latest/src/sonicfx.min.js"></script>
    <script>
      const logsEl = document.getElementById('logs');
      const muteBtn = document.getElementById('muteBtn');
      const muteIcon = document.getElementById('muteIcon');
      const muteText = document.getElementById('muteText');

      function log(message) {
        const timestamp = new Date().toLocaleTimeString();
        logsEl.innerHTML += `[${timestamp}] ${message}<br>`;
        logsEl.scrollTop = logsEl.scrollHeight;
      }

      function trigger(method) {
        if (typeof SonicFX[method] === 'function') {
          SonicFX[method]();
          log(`Executed: SonicFX.${method}()`);
        }
      }

      // Trigger state change toggle on interface action click
      muteBtn.addEventListener('click', () => {
        SonicFX.toggleMute();
      });

      // Dynamic State Management Subscription Event Loop
      window.addEventListener('sonicfx-mute-toggle', (e) => {
        const isMuted = e.detail.isMuted;
        if (isMuted) {
          muteBtn.classList.remove('is-info');
          muteBtn.classList.add('is-danger');
          muteIcon.className = 'fas fa-volume-mute';
          muteText.textContent = 'Unmute Audio';
          log('Framework Status Changed: MUTED');
        } else {
          muteBtn.classList.remove('is-danger');
          muteBtn.classList.add('is-info');
          muteIcon.className = 'fas fa-volume-up';
          muteText.textContent = 'Mute Audio';
          log('Framework Status Changed: UNMUTED');
        }
      });

      log("SonicFX Playground Initialized on Bulma UI layout framework.");
    </script>
  </body>
  </html>
